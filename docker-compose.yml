version: "3.9"

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: jira_intel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jira_user
      POSTGRES_PASSWORD: jira_pass
      POSTGRES_DB: jira_intel
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jira_user -d jira_intel"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - jira_net

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: jira_intel_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfilename "appendonly.aof"
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jira_net

  # ─── Backend ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    container_name: jira_intel_backend
    restart: unless-stopped
    env_file:
      - .env.dev
    ports:
      - "8000:8000"
    volumes:
      - faiss_data:/app/data/faiss
      - models_data:/app/models
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - jira_net
    labels:
      - "com.jira-intel.service=backend"
      - "com.jira-intel.version=1.0.0"

  # ─── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: jira_intel_prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - jira_net
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  faiss_data:
  models_data:
  prometheus_data:

networks:
  jira_net:
    driver: bridge